name: Deploy (SFTP)

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  deploy-production:
    name: Deploy production (main)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: sftp-deploy-main
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync files over SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          port: ${{ secrets.SFTP_PORT }}
          remote_path: ${{ secrets.SFTP_REMOTE_PATH }}
          local_path: ./
          sftp_only: true
          password: ${{ secrets.SFTP_PASSWORD }}
          ssh_private_key: ""
          sftpArgs: "-o StrictHostKeyChecking=no -o ConnectTimeout=30"
          rsyncArgs: >-
            --exclude=.git
            --exclude=.github
            --exclude=system/.env
            --exclude=system/storage/framework/cache
            --exclude=system/storage/framework/sessions
            --exclude=system/storage/framework/views
            --exclude=system/storage/logs

  deploy-development:
    name: Deploy development (dev)
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    concurrency:
      group: sftp-deploy-dev
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync files over SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          port: ${{ secrets.SFTP_PORT }}
          remote_path: ${{ secrets.SFTP_REMOTE_PATH_DEV }}
          local_path: ./
          sftp_only: true
          password: ${{ secrets.SFTP_PASSWORD }}
          ssh_private_key: ""
          sftpArgs: "-o StrictHostKeyChecking=no -o ConnectTimeout=30"
          rsyncArgs: >-
            --exclude=.git
            --exclude=.github
            --exclude=system/.env
            --exclude=system/storage/framework/cache
            --exclude=system/storage/framework/sessions
            --exclude=system/storage/framework/views
            --exclude=system/storage/logs
